<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>miniciv Replay Viewer</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;overflow-x:hidden;user-select:none}

/* ===== Layout ===== */
#app{display:flex;flex-direction:column;height:100vh;max-width:1200px;margin:0 auto}

/* ===== Control Bar ===== */
#control-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#16213e;border-bottom:1px solid #0f3460;flex-wrap:wrap}
#control-bar button{padding:6px 14px;border:1px solid #0f3460;border-radius:4px;background:#1a3a5c;color:#e0e0e0;cursor:pointer;font-size:13px;transition:background .15s}
#control-bar button:hover{background:#0f3460}
#control-bar button.active{background:#e94560;border-color:#e94560;color:#fff}
#turn-display{margin-left:auto;font-size:14px;color:#a0a0cb;white-space:nowrap}
#winner-display{margin-left:12px;font-size:14px;font-weight:700;color:#ffd700;white-space:nowrap}

/* ===== Main Content ===== */
#main-content{display:flex;flex:1;overflow:hidden}
#map-container{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:12px;overflow:auto;position:relative}

/* ===== Map Grid ===== */
#map-grid{display:grid;gap:0;border:2px solid #0f3460;background:#16213e;position:relative}
.map-cell{width:32px;height:32px;position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:filter .15s}
.map-cell:hover{filter:brightness(1.15);z-index:1}
.map-cell.event-highlight{animation:eventPulse .6s ease-out}
@keyframes eventPulse{0%{box-shadow:inset 0 0 0 3px #ffeb3b}100%{box-shadow:inset 0 0 0 0 transparent}}
.map-cell .city-overlay{position:absolute;bottom:1px;right:1px;font-size:7px;line-height:1;padding:0 2px;border-radius:2px;background:rgba(0,0,0,.5);color:#fff}
.map-cell .city-owner{position:absolute;top:1px;left:1px;width:6px;height:6px;border-radius:50%;border:1px solid rgba(255,255,255,.5)}

/* ===== Units ===== */
.unit-box{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:14px;font-weight:700;border:2px solid;position:relative;z-index:2;transition:transform .1s}
.unit-box:hover{transform:scale(1.1);z-index:5}
.unit-box.p0{background:rgba(21,101,192,.2);border-color:#1565c0;color:#1565c0}
.unit-box.p1{background:rgba(198,40,40,.2);border-color:#c62828;color:#c62828}
.unit-stack-badge{position:absolute;top:-4px;right:-4px;background:#e94560;color:#fff;border-radius:50%;font-size:8px;width:14px;height:14px;display:flex;align-items:center;justify-content:center;font-weight:700;z-index:6}

/* ===== Side Panel ===== */
#side-panel{width:260px;min-width:260px;padding:10px 12px;background:#16213e;border-left:1px solid #0f3460;overflow-y:auto;font-size:13px;line-height:1.6}
#side-panel h3{font-size:14px;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid #0f3460}
#side-panel .p0-title{color:#42a5f5}
#side-panel .p1-title{color:#ef5350}
#side-panel hr{border:none;border-top:1px solid #0f3460;margin:8px 0}
.side-label{color:#a0a0cb}
.side-annotation{color:#888;font-size:11px}
.side-resources{display:flex;gap:8px;flex-wrap:wrap}
.side-res-item{background:#0d1b2a;padding:2px 8px;border-radius:3px;font-size:12px}

/* ===== Events Panel ===== */
#events-panel{margin-top:8px;border-top:1px solid #0f3460;padding-top:6px}
#events-panel h4{font-size:13px;color:#a0a0cb;margin-bottom:4px}
.event-item{font-size:11px;padding:2px 4px;border-radius:2px;margin-bottom:2px;background:#0d1b2a;color:#b0b0b0}
.event-item .ev-p0{color:#42a5f5}
.event-item .ev-p1{color:#ef5350}

/* ===== Bottom Reference Bar ===== */
#bottom-bar{display:flex;border-top:1px solid #0f3460;background:#16213e;min-height:80px;font-size:10px;line-height:1.4;overflow-x:auto}
.ref-section{padding:6px 10px;flex:1;min-width:200px;border-right:1px solid #0f3460}
.ref-section:last-child{border-right:none}
.ref-section h5{font-size:11px;color:#a0a0cb;margin-bottom:3px}
.ref-table{width:100%;border-collapse:collapse}
.ref-table td{padding:1px 4px;vertical-align:top;white-space:nowrap}
.ref-table .td-abbrev{font-weight:700;width:16px;text-align:center}
.ref-table .td-desc{color:#b0b0b0}
.ref-table .p0-text{color:#42a5f5;font-weight:600}
.ref-table .p1-text{color:#ef5350;font-weight:600}
.tech-tree{font-size:9px;color:#b0b0b0;line-height:1.5}
.tech-tree .tt-m{color:#ce93d8}
.tech-tree .tt-e{color:#81c784}
.tech-tree .tt-c{color:#ffb74d}
.tech-tree .tt-done{color:#4caf50}
.tech-tree .tt-name{color:#e0e0e0}

/* ===== Tooltip ===== */
#tooltip{position:fixed;padding:8px 10px;background:rgba(13,27,42,.95);border:1px solid #0f3460;border-radius:4px;font-size:12px;line-height:1.5;color:#e0e0e0;pointer-events:none;z-index:1000;max-width:280px;display:none;box-shadow:0 4px 12px rgba(0,0,0,.4)}
#tooltip .tt-title{font-weight:700;margin-bottom:2px}
#tooltip .tt-p0{color:#42a5f5}
#tooltip .tt-p1{color:#ef5350}

/* ===== Detail Card ===== */
#detail-card{position:fixed;width:220px;background:rgba(13,27,42,.96);border:1px solid #e94560;border-radius:6px;padding:12px;font-size:12px;line-height:1.6;z-index:999;display:none;box-shadow:0 6px 20px rgba(0,0,0,.5)}
#detail-card .dc-close{float:right;cursor:pointer;color:#e94560;font-size:16px;line-height:1;padding:0 4px}
#detail-card .dc-close:hover{color:#ff6b6b}
#detail-card h4{font-size:14px;margin-bottom:6px;color:#e0e0e0}
#detail-card .dc-row{display:flex;justify-content:space-between;padding:1px 0}
#detail-card .dc-label{color:#a0a0cb}
#detail-card .dc-value{color:#e0e0e0;font-weight:600}
#detail-card .dc-tech-bonus{color:#81c784;font-size:11px}
#detail-card .dc-section-title{font-size:11px;color:#a0a0cb;margin-top:6px;margin-bottom:2px;border-bottom:1px solid #0f3460;padding-bottom:1px}
#detail-card .dc-special{color:#ffb74d;font-size:11px}
#detail-card .dc-cost{color:#b0b0b0;font-size:11px}

/* ===== Error ===== */
#error-display{display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:12px;padding:40px;color:#e94560;font-size:18px;text-align:center}
#error-display .err-detail{font-size:14px;color:#a0a0cb}

/* ===== Empty / No data ===== */
.no-data-notice{color:#a0a0cb;font-size:13px;text-align:center;padding:24px}

/* ===== Responsive ===== */
@media(max-width:800px){
  #main-content{flex-direction:column}
  #side-panel{width:100%;min-width:auto;border-left:none;border-top:1px solid #0f3460;max-height:300px}
  .map-cell{width:28px;height:28px}
  .unit-box{width:24px;height:24px;font-size:12px}
}
</style>
</head>
<body>

<div id="app">
  <!-- Control Bar -->
  <div id="control-bar">
    <button id="btn-prev" title="上一回合 (←)">← 上一回合</button>
    <button id="btn-next" title="下一回合 (→)">下一回合 →</button>
    <button id="btn-auto" title="自动播放 (Space)">自动播放</button>
    <button id="speed-1x" class="speed-btn active">1x</button>
    <button id="speed-2x" class="speed-btn">2x</button>
    <button id="speed-5x" class="speed-btn">5x</button>
    <button id="btn-file" title="加载回放文件">📂 加载回放</button>
    <button id="btn-sample" title="打开内置示例">📂 示例回放</button>
    <span id="turn-display">回合: --</span>
    <span id="winner-display"></span>
    <input type="file" id="file-input" accept=".json" style="display:none">
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <div id="map-container">
      <div id="map-grid"></div>
    </div>
    <div id="side-panel"></div>
  </div>

  <!-- Bottom Reference Bar -->
  <div id="bottom-bar"></div>
</div>

<!-- Tooltip & Detail Card -->
<div id="tooltip"></div>
<div id="detail-card"></div>

    showError('错误: 回放中没有回合数据');
    return false;
  }
  // Get terrain: from config.terrain_grid or terrain-data script tag

    mapSize = replayData.config.size || 15;

    if (terrainScript) {

  }
  if (!terrainGrid) {
    // fallback: generate flat plain grid
    terrainGrid = Array.from({length: mapSize}, () => Array(mapSize).fill(0));
  }
  return true;
}

// ===== ERROR DISPLAY =====

function escapeHtml(s) {
  if (typeof s !== 'string') s = String(s);
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== RENDER: MAP =====
function renderMap(turnIdx) {
  const turn = replayData.turns[turnIdx];
  currentUnits = turn.units || [];
  currentCities = turn.cities || [];
  currentEvents = turn.events || [];

  // Build economy/tech lookup
  (turn.economies || []).forEach(e => { currentEconomies[e.pid] = e; });
  (turn.techs || []).forEach(t => { currentTechs[t.pid] = t; });
  currentFacilityCount = turn.facility_count || {'0':0,'1':0};

  // Collect event highlight positions
  const eventCells = new Set();
  currentEvents.forEach(ev => {
    if (ev.x !== undefined && ev.y !== undefined) {
      eventCells.add(ev.y + ',' + ev.x);
    }
  });

  // Build city lookup map
  const cityMap = {};
  currentCities.forEach(c => { cityMap[c.y + ',' + c.x] = c; });

  // Build unit grid (multi-unit per cell)
  const unitGrid = {};
  currentUnits.forEach(u => {
    const key = u.y + ',' + u.x;
    if (!unitGrid[key]) unitGrid[key] = [];
    unitGrid[key].push(u);
  });

  // Render grid
  mapGrid.style.gridTemplateColumns = 'repeat(' + mapSize + ',32px)';
  mapGrid.innerHTML = '';

  for (let y = 0; y < mapSize; y++) {
    for (let x = 0; x < mapSize; x++) {
      const cell = document.createElement('div');
      cell.className = 'map-cell';
      const tVal = (terrainGrid[y] && terrainGrid[y][x] !== undefined) ? terrainGrid[y][x] : 0;
      const tInfo = TERRAIN[tVal] || TERRAIN[0];
      cell.style.backgroundColor = tInfo.color;

      // Event highlight
      const evKey = y + ',' + x;
      if (eventCells.has(evKey)) {
        cell.classList.add('event-highlight');
      }

      // City overlay
      const city = cityMap[evKey];
      if (city) {
        const owner = document.createElement('div');
        owner.className = 'city-owner';
        owner.style.backgroundColor = city.pid === 0 ? '#1565c0' : '#c62828';
        cell.appendChild(owner);
        const hpLabel = document.createElement('div');
        hpLabel.className = 'city-overlay';
        hpLabel.textContent = 'HP' + city.hp;
        cell.appendChild(hpLabel);
      }

      // Units on this cell
      const cellUnits = unitGrid[evKey];
      if (cellUnits && cellUnits.length > 0) {
        if (cellUnits.length === 1) {
          const u = cellUnits[0];
          const meta = UNIT_META[u.type] || {abbrev: '?'};
          const box = document.createElement('div');
          box.className = 'unit-box ' + (u.pid === 0 ? 'p0' : 'p1');
          box.textContent = meta.abbrev;
          box.dataset.uidx = currentUnits.indexOf(u);
          box.dataset.pid = u.pid;
          box.dataset.type = u.type;
          cell.appendChild(box);
        } else {
          // Stack: show first unit + count badge
          const u = cellUnits[0];
          const meta = UNIT_META[u.type] || {abbrev: '?'};
          const box = document.createElement('div');
          box.className = 'unit-box ' + (u.pid === 0 ? 'p0' : 'p1');
          box.textContent = meta.abbrev;
          box.dataset.uidx = currentUnits.indexOf(u);
          box.dataset.pid = u.pid;
          box.dataset.type = u.type;
          cell.appendChild(box);
          const badge = document.createElement('div');
          badge.className = 'unit-stack-badge';
          badge.textContent = cellUnits.length;
          cell.appendChild(badge);
        }
      }

      // Store terrain/coord data for tooltip
      cell.dataset.x = x;
      cell.dataset.y = y;
      cell.dataset.terrain = tVal;
      cell.dataset.hasUnits = (cellUnits && cellUnits.length > 0) ? '1' : '0';

      mapGrid.appendChild(cell);
    }
  }
}

// ===== RENDER: SIDE PANEL =====
function renderSidePanel(turnIdx) {
  const turn = replayData.turns[turnIdx];

  function renderPlayerInfo(pid, label, titleClass) {
    const eco = turn.economies ? turn.economies.find(e => e.pid === pid) : null;
    const tech = turn.techs ? turn.techs.find(t => t.pid === pid) : null;
    const fc = turn.facility_count ? (turn.facility_count[pid] || 0) : 0;
    const units = turn.units ? turn.units.filter(u => u.pid === pid) : [];
    const completedTechs = (tech && tech.completed) || [];
    const researching = (tech && tech.researching) || null;

    // Unit breakdown
    const unitCounts = {};
    units.forEach(u => { unitCounts[u.type] = (unitCounts[u.type] || 0) + 1; });
    const unitBreakdown = Object.keys(unitCounts).map(t => {
      const abbr = (UNIT_META[t] || {abbrev:'?'}).abbrev;
      return unitCounts[t] + abbr;
    }).join(' ');

    // Construction score
    const cTechs = completedTechs.filter(t => t.startsWith('C'));
    const cScore = cTechs.length;

    // Semantic annotations
    const facAnnotation = fc > 0 ? '(C5胜利需8设施)' : '';
    const cAnnotation = cScore > 0 ? '(已完成: ' + cTechs.join(' ') + ')' : '(无)';

    // Start resources (from turn 1)
    const turn1 = replayData.turns[0];
    const startEco = turn1.economies ? turn1.economies.find(e => e.pid === pid) : null;
    const startStr = startEco ? '(起始: ' + startEco.food + '/' + startEco.wood + '/' + startEco.gold + ')' : '';

    let html = '<h3 class="' + titleClass + '">' + label + '</h3>';

    if (eco) {
      html += '<div class="side-resources"><span class="side-res-item">粮食: ' + eco.food + '</span>';
      html += '<span class="side-res-item">木材: ' + eco.wood + '</span>';
      html += '<span class="side-res-item">金币: ' + eco.gold + '</span></div>';
      if (startStr) html += '<div class="side-annotation">' + startStr + '</div>';
    }

    // Techs
    html += '<div class="side-label">已完成科技: <b>' + completedTechs.length + '</b>';
    if (completedTechs.length > 0) {
      const names = completedTechs.map(t => TECH_INFO[t] ? t + '(' + TECH_INFO[t].name + ')' : t).join(', ');
      html += ' <span class="side-annotation">(' + names + ')</span>';
    }
    html += '</div>';

    if (researching) {
      const rName = TECH_INFO[researching] ? researching + '(' + TECH_INFO[researching].name + ')' : researching;
      html += '<div class="side-label">研究中: <b>' + rName + '</b></div>';
    } else {
      html += '<div class="side-label">研究中: <span class="side-annotation">无</span></div>';
    }

    // Facilities
    html += '<div class="side-label">设施: <b>' + fc + '</b> <span class="side-annotation">' + facAnnotation + '</span></div>';

    // Units
    html += '<div class="side-label">存活单位: <b>' + units.length + '</b>';
    if (unitBreakdown) html += ' <span class="side-annotation">(' + unitBreakdown + ')</span>';
    html += '</div>';

    // Construction score
    html += '<div class="side-label">建设分数: <b>' + cScore + '</b> <span class="side-annotation">' + cAnnotation + '</span></div>';

    return html;
  }

  let html = '';
  html += '<div id="p0-info">' + renderPlayerInfo(0, 'P0 (蓝方)', 'p0-title') + '</div>';
  html += '<hr>';
  html += '<div id="p1-info">' + renderPlayerInfo(1, 'P1 (红方)', 'p1-title') + '</div>';

  // Events
  html += '<div id="events-panel">';
  const evts = turn.events || [];
  if (evts.length > 0) {
    html += '<h4>第' + turn.turn + '回合事件:</h4>';
    evts.forEach(ev => {
      const pidClass = ev.pid === 0 ? 'ev-p0' : 'ev-p1';
      const pidLabel = 'P' + ev.pid;
      let detail = ev.detail || ev.type;
      if (ev.x !== undefined && ev.y !== undefined) {
        // detail already may contain coordinates
      }
      html += '<div class="event-item"><span class="' + pidClass + '">' + pidLabel + '</span>: ' + escapeHtml(detail) + '</div>';
    });
  }
  html += '</div>';

  sidePanel.innerHTML = html;
}

// ===== RENDER: ALL =====
function render(turnIdx) {
  if (!replayData || !replayData.turns || turnIdx < 0 || turnIdx >= replayData.turns.length) return;
  currentTurnIdx = turnIdx;
  const turn = replayData.turns[turnIdx];
  const total = replayData.turns.length;
  const maxTurns = replayData.config ? replayData.config.max_turns : total;

  turnDisplay.textContent = '回合: ' + turn.turn + ' / ' + maxTurns;

  // Winner display
  if (replayData.result && replayData.result.winner !== null && replayData.result.winner !== undefined) {
    const w = replayData.result.winner;
    const vType = replayData.result.victory_type || 'unknown';
    const finalT = replayData.result.final_turn || '';
    // Only show winner when at or near the last turn
    if (turnIdx === replayData.turns.length - 1) {
      winnerDisplay.textContent = '胜者: P' + w + ' (' + vType + ', T' + finalT + ')';
    } else {
      winnerDisplay.textContent = '';
    }
  }

  renderMap(turnIdx);
  renderSidePanel(turnIdx);
}

// ===== NAVIGATION =====
function goToTurn(idx) {
  if (!replayData || !replayData.turns) return;
  if (idx < 0) idx = 0;
  if (idx >= replayData.turns.length) idx = replayData.turns.length - 1;
  render(idx);
}

function nextTurn() {
  if (currentTurnIdx < replayData.turns.length - 1) {
    goToTurn(currentTurnIdx + 1);
  }
}

function prevTurn() {
  if (currentTurnIdx > 0) {
    goToTurn(currentTurnIdx - 1);
  }
}

// ===== AUTO PLAY =====
function toggleAutoPlay() {
  autoPlaying = !autoPlaying;
  btnAuto.textContent = autoPlaying ? '停止' : '自动播放';
  btnAuto.classList.toggle('active', autoPlaying);
  if (autoPlaying) {
    if (currentTurnIdx >= replayData.turns.length - 1) {
      goToTurn(0);
    }
    autoTimer = setInterval(function() {
      if (currentTurnIdx >= replayData.turns.length - 1) {
        stopAutoPlay();
        return;
      }
      nextTurn();
    }, autoSpeed);
  } else {
    stopAutoPlay();
  }
}

function stopAutoPlay() {
  autoPlaying = false;
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
  btnAuto.textContent = '自动播放';
  btnAuto.classList.remove('active');
}

function setSpeed(speedId) {
  speedBtns.forEach(function(b) { b.classList.remove('active'); });
  document.getElementById(speedId).classList.add('active');
  autoSpeed = SPEED_MAP[speedId];
  if (autoPlaying) {
    stopAutoPlay();
    toggleAutoPlay();
  }
}

// ===== TOOLTIP =====
function getUnitsAt(x, y) {
  return currentUnits.filter(function(u) { return u.x === x && u.y === y; });
}

function computeTechBonuses(pid, unitType) {
  const tech = currentTechs[pid];
  if (!tech || !tech.completed) return {atk:0, def:0, hp:0, details:[]};
  const completed = tech.completed;
  const details = [];
  let atkBonus = 0, defBonus = 0, hpBonus = 0;

  if (completed.indexOf('M1') >= 0 && (unitType === 'infantry' || unitType === 'archer')) {
    atkBonus += 5;
    details.push('ATK+5 from M1 锻造');
  }
  if (completed.indexOf('M3') >= 0) {
    defBonus += 10;
    details.push('DEF+10 from M3 筑垒(林山)');
  }
  if (completed.indexOf('M4') >= 0) {
    hpBonus += 10;
    details.push('HP+10 from M4 精兵');
  }
  if (completed.indexOf('M2') >= 0 && unitType === 'cavalry') {
    atkBonus += 5;
    details.push('冲锋+5 from M2 骑兵');
  }
  return {atk: atkBonus, def: defBonus, hp: hpBonus, details: details};
}

function showTooltip(e, cell) {
  const x = parseInt(cell.dataset.x);
  const y = parseInt(cell.dataset.y);
  const tVal = parseInt(cell.dataset.terrain);
  const tInfo = TERRAIN[tVal] || TERRAIN[0];
  const units = getUnitsAt(x, y);

  let html = '';

  if (units.length > 0) {
    const u = units[0];
    const meta = UNIT_META[u.type] || {name: '?'};
    const pidClass = u.pid === 0 ? 'tt-p0' : 'tt-p1';
    const bonuses = computeTechBonuses(u.pid, u.type);
    html += '<div class="tt-title ' + pidClass + '">P' + u.pid + ' ' + meta.name + '</div>';
    html += 'HP: ' + u.hp;
    if (bonuses.hp > 0) html += '+' + bonuses.hp;
    html += ' | ATK: ' + u.atk;
    if (bonuses.atk > 0) html += '+' + bonuses.atk;
    html += ' | DEF: ' + u.def;
    if (bonuses.def > 0) html += '+' + bonuses.def;
    if (bonuses.details.length > 0) html += '<br><span style="color:#81c784;font-size:11px">' + bonuses.details.join(', ') + '</span>';
    if (units.length > 1) {
      html += '<br><span style="color:#ffb74d">本格还有 ' + (units.length - 1) + ' 个单位</span>';
    }
  } else {
    html += '<div class="tt-title">' + tInfo.name + '</div>';
    html += 'DEF+' + tInfo.def + ' | ' + tInfo.build + ' | ' + tInfo.pass;
    if (tInfo.ballistic !== '-') html += ' | ' + tInfo.ballistic;
  }

  tooltip.innerHTML = html;
  tooltip.style.display = 'block';
  positionTooltip(e);
}

function positionTooltip(e) {
  let x = e.clientX + 14;
  let y = e.clientY + 14;
  const rect = tooltip.getBoundingClientRect();
  if (x + rect.width > window.innerWidth - 10) x = e.clientX - rect.width - 10;
  if (y + rect.height > window.innerHeight - 10) y = e.clientY - rect.height - 10;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

function hideTooltip() {
  tooltip.style.display = 'none';
}

// ===== DETAIL CARD =====
function getFullUnitStats(unit) {
  const meta = UNIT_META[unit.type];
  if (!meta) return null;
  const bonuses = computeTechBonuses(unit.pid, unit.type);
  return {
    name: meta.name,
    abbrev: meta.abbrev,
    baseStats: meta,
    currentStats: {
      hp: meta.hp + bonuses.hp,
      atk: meta.atk + bonuses.atk,
      def: meta.def + bonuses.def,
      move: meta.move,
      vision: meta.vision,
      range: meta.range
    },
    bonuses: bonuses,
    cost: UNIT_COST[unit.type] || '?',
    special: UNIT_SPECIAL[unit.type] || []
  };
}

function showDetailCard(unit, e) {
  const stats = getFullUnitStats(unit);
  if (!stats) return;

  let html = '<span class="dc-close" onclick="document.getElementById(\'detail-card\').style.display=\'none\'">&times;</span>';
  html += '<h4 style="color:' + (unit.pid === 0 ? '#42a5f5' : '#ef5350') + '">P' + unit.pid + ' ' + stats.name + '</h4>';

  html += '<div class="dc-section-title">属性</div>';
  html += '<div class="dc-row"><span class="dc-label">HP</span><span class="dc-value">' + unit.hp + ' / ' + stats.baseStats.hp + (stats.bonuses.hp > 0 ? '<span class="dc-tech-bonus"> +' + stats.bonuses.hp + '</span>' : '') + '</span></div>';
  html += '<div class="dc-row"><span class="dc-label">ATK</span><span class="dc-value">' + unit.atk + (stats.bonuses.atk > 0 ? '<span class="dc-tech-bonus"> +' + stats.bonuses.atk + '</span>' : '') + '</span></div>';
  html += '<div class="dc-row"><span class="dc-label">DEF</span><span class="dc-value">' + unit.def + (stats.bonuses.def > 0 ? '<span class="dc-tech-bonus"> +' + stats.bonuses.def + '</span>' : '') + '</span></div>';
  html += '<div class="dc-row"><span class="dc-label">移动力</span><span class="dc-value">' + stats.currentStats.move + '</span></div>';
  html += '<div class="dc-row"><span class="dc-label">视野</span><span class="dc-value">' + stats.currentStats.vision + '</span></div>';
  html += '<div class="dc-row"><span class="dc-label">射程</span><span class="dc-value">' + stats.currentStats.range + '</span></div>';

  if (stats.bonuses.details.length > 0) {
    html += '<div class="dc-section-title">科技加成</div>';
    stats.bonuses.details.forEach(function(d) {
      html += '<div class="dc-tech-bonus">' + d + '</div>';
    });
  }

  html += '<div class="dc-section-title">生产成本</div>';
  html += '<div class="dc-cost">' + stats.cost + '</div>';

  if (stats.special.length > 0) {
    html += '<div class="dc-section-title">特殊能力</div>';
    stats.special.forEach(function(s) {
      html += '<div class="dc-special">' + s + '</div>';
    });
  }

  detailCard.innerHTML = html;
  detailCard.style.display = 'block';

  // Position near the click but on the side
  let x = e.clientX + 10;
  let y = e.clientY - 80;
  const rect = detailCard.getBoundingClientRect();
  if (x + rect.width > window.innerWidth - 10) x = e.clientX - rect.width - 10;
  if (y < 10) y = 10;
  if (y + rect.height > window.innerHeight - 10) y = window.innerHeight - rect.height - 10;
  detailCard.style.left = x + 'px';
  detailCard.style.top = y + 'px';
}

function hideDetailCard(e) {
  // Don't hide if clicking inside the card
  if (detailCard.contains(e.target)) return;
  detailCard.style.display = 'none';
}

// ===== SETUP EVENTS =====
function setupControls() {
  btnPrev.addEventListener('click', prevTurn);
  btnNext.addEventListener('click', nextTurn);
  btnAuto.addEventListener('click', toggleAutoPlay);
  btnFile.addEventListener('click', function() { fileInput.click(); });
  btnSample.addEventListener('click', loadSampleData);
  fileInput.addEventListener('change', handleFileSelect);
  speedBtns.forEach(function(b) {
    b.addEventListener('click', function() { setSpeed(b.id); });
  });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') { e.preventDefault(); prevTurn(); }
    else if (e.key === 'ArrowRight') { e.preventDefault(); nextTurn(); }
    else if (e.key === ' ') { e.preventDefault(); toggleAutoPlay(); }
  });

  // Map hover tooltip - event delegation
  mapGrid.addEventListener('mouseover', function(e) {
    const cell = e.target.closest('.map-cell');
    if (cell) {
      showTooltip(e, cell);
    }
  });
  mapGrid.addEventListener('mousemove', function(e) {
    if (tooltip.style.display === 'block') {
      positionTooltip(e);
    }
  });
  mapGrid.addEventListener('mouseout', function(e) {
    const cell = e.target.closest('.map-cell');
    if (cell && !cell.contains(e.relatedTarget)) {
      hideTooltip();
    }
  });

  // Click unit → detail card
  mapGrid.addEventListener('click', function(e) {
    const unitBox = e.target.closest('.unit-box');
    if (unitBox) {
      const idx = parseInt(unitBox.dataset.uidx);
      if (!isNaN(idx) && currentUnits[idx]) {
        showDetailCard(currentUnits[idx], e);
        return;
      }
    }
    // Click elsewhere: hide detail card
    hideDetailCard(e);
  });

  // Click outside detail card to close
  document.addEventListener('click', function(e) {
    if (detailCard.style.display === 'block' && !detailCard.contains(e.target) && !e.target.closest('.unit-box')) {
      detailCard.style.display = 'none';
    }
  });

  // Drag-and-drop
  const app = document.getElementById('app');
  app.addEventListener('dragover', handleDragOver);
  app.addEventListener('drop', handleDrop);
}

// ===== File Loading =====
function setReplayData(data) {
  stopAutoPlay();
  replayData = data;
  terrainGrid = (data.config && data.config.terrain_grid) ? data.config.terrain_grid : null;
  mapSize = (data.config && data.config.size) || 15;
  if (!terrainGrid) {
    terrainGrid = Array.from({length: mapSize}, () => Array(mapSize).fill(0));
  }
  if (!replayData.turns || replayData.turns.length === 0) {
    showError('错误: 回放中没有回合数据');
    return;
  }
  currentTurnIdx = 0;
  hideTooltip();
  detailCard.style.display = 'none';
  renderBottomBar();
  render(0);
}

function detectFileType(data) {
  // Return format description for error messages
  if (data.turns && Array.isArray(data.turns)) return 'replay';
  if (Array.isArray(data) && data.length > 0 && data[0].winner !== undefined) return 'eval_results';
  if (data.format_version) return 'unknown_replay_format';
  if (data.config && data.result) return 'replay_no_turns';
  return 'unknown';
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      const ftype = detectFileType(data);
      if (ftype === 'eval_results') {
        showError('格式不匹配',
          '这是批量评估结果文件（每局摘要），不是回放文件。\n\n回放文件在 experiments/.../replays/ 目录下，文件名包含 seed 和回合数。\n\n当前文件包含 ' + data.length + ' 局评估数据。');
        return;
      }
      if (ftype === 'replay') {
        setReplayData(data);
        return;
      }
      if (!data.turns || !Array.isArray(data.turns) || data.turns.length === 0) {
        showError('文件格式错误',
          'JSON 缺少 turns 数组（逐回合快照）。\n\n' +
          '顶层字段: ' + Object.keys(data).join(', ') + '\n' +
          '这不是回放文件。回放文件在 experiments/.../replays/ 目录下。\n' +
          '如果这是评估结果，请加载 replays/ 子目录中的文件。');
        return;
      }
      setReplayData(data);
    } catch(err) {
      showError('JSON 解析失败', err.message + '\n\n请确认文件是有效的 JSON 格式。');
    }
  };
  reader.readAsText(file);
  fileInput.value = '';
}

function loadSampleData() {
  if (!embeddedReplayData) {
    showError('错误', '无内置示例数据');
    return;
  }
  setReplayData(JSON.parse(JSON.stringify(embeddedReplayData)));
}

function handleDragOver(e) {
  e.preventDefault();
  e.stopPropagation();
  e.dataTransfer.dropEffect = 'copy';
}

function handleDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  const files = e.dataTransfer.files;
  if (files.length > 0) {
    const file = files[0];
    if (!file.name.endsWith('.json')) {
      showError('文件格式错误', '请拖入 .json 文件');
      return;
    }
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        const ftype = detectFileType(data);
        if (ftype === 'eval_results') {
          showError('格式不匹配',
            '这是批量评估结果文件，不是回放文件。\n\n回放文件在 experiments/.../replays/ 目录下。\n当前文件包含 ' + data.length + ' 局评估数据。');
          return;
        }
        if (ftype === 'replay') {
          setReplayData(data);
          return;
        }
        if (!data.turns || !Array.isArray(data.turns) || data.turns.length === 0) {
          showError('文件格式错误',
            'JSON 缺少 turns 数组。\n顶层字段: ' + Object.keys(data).join(', ') + '\n回放文件在 experiments/.../replays/ 目录下。');
          return;
        }
        setReplayData(data);
      } catch(err) {
        showError('JSON 解析失败', err.message + '\n\n请确认文件是有效的 JSON 格式。');
      }
    };
    reader.readAsText(file);
  }
}

// ===== INIT =====
function init() {
  if (!loadReplayData()) return;

  renderBottomBar();
  render(0);
  setupControls();
  console.log('miniciv Replay Viewer initialized. Turns:', replayData.turns.length);
}

// Run on DOM ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

})();
</script>
